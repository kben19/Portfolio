<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kelvin Benzali — Portfolio UI Kit</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script type="text/babel" src="LuminNovelSection.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="ProjectScreen.jsx"></script>
<script type="text/babel">
function App() {
  const initial = new URLSearchParams(window.location.search).get("screen") || "home";
  const [screen, setScreen] = React.useState(initial);
  React.useEffect(() => { window.scrollTo(0, 0); }, [screen]);
  if (typeof HomeScreen === "undefined" || typeof ProjectScreen === "undefined") return null;
  return screen === "home"
    ? <HomeScreen onNavigate={setScreen} />
    : <ProjectScreen onNavigate={setScreen} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
