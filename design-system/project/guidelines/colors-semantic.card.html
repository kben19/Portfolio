<!-- @dsCard group="Colors" viewport="700x150" name="Semantic — Tone Chips" subtitle="Good / bad / neutral delta chips used in the analytics dashboard" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);display:flex;align-items:center;justify-content:center;height:150px;gap:16px}
  .chip{border-radius:var(--radius-md);padding:8px 14px;font-size:14px;font-weight:var(--weight-medium)}
</style></head>
<body>
  <span class="chip" style="background:var(--tone-good-bg);color:var(--tone-good-fg)">+18% good</span>
  <span class="chip" style="background:var(--tone-bad-bg);color:var(--tone-bad-fg)">-4% bad</span>
  <span class="chip" style="background:var(--tone-neutral-bg);color:var(--tone-neutral-fg)">0% neutral</span>
</body></html>
