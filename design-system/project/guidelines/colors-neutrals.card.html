<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page)}
  .row{display:flex;height:150px}
  .sw{flex:1;display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;color:white;font-size:12px}
  .sw.light{color:var(--text-primary)}
</style></head>
<body>
<div class="row">
  <div class="sw light" style="background:var(--gray-50)">gray-50</div>
  <div class="sw light" style="background:var(--gray-200)">gray-200</div>
  <div class="sw light" style="background:var(--gray-400)">gray-400</div>
  <div class="sw" style="background:var(--gray-700)">gray-700</div>
  <div class="sw" style="background:var(--gray-900)">gray-900</div>
  <div class="sw" style="background:var(--slate-700)">slate-700</div>
  <div class="sw" style="background:var(--slate-800)">slate-800</div>
  <div class="sw" style="background:var(--slate-900)">slate-900</div>
</div>
</body></html>
