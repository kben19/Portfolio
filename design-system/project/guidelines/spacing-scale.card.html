<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="Tailwind-default scale, as used in source" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--bg-page);display:flex;align-items:flex-end;gap:8px;height:160px;padding:16px 24px;box-sizing:border-box}
.bar{background:var(--emerald-400);width:28px}
.col{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--text-muted)}
</style></head>
<body>
<div class="col"><div class="bar" style="height:var(--space-2)"></div>8px</div>
<div class="col"><div class="bar" style="height:var(--space-4)"></div>16px</div>
<div class="col"><div class="bar" style="height:var(--space-6)"></div>24px</div>
<div class="col"><div class="bar" style="height:var(--space-8)"></div>32px</div>
<div class="col"><div class="bar" style="height:var(--space-12)"></div>48px</div>
<div class="col"><div class="bar" style="height:var(--space-16)"></div>64px</div>
<div class="col"><div class="bar" style="height:96px"></div>80px+</div>
</body></html>
