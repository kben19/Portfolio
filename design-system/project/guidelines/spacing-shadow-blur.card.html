<!-- @dsCard group="Spacing" viewport="700x180" name="Shadow & Blur" subtitle="Used sparingly — button hover, frosted timeline card" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--gray-100);display:flex;align-items:center;gap:24px;height:180px;padding:0 24px;box-sizing:border-box}
.card{width:180px;height:120px;border-radius:var(--radius-2xl);display:flex;align-items:center;justify-content:center;font-size:12px;text-align:center;padding:10px;box-sizing:border-box}
</style></head>
<body>
<div class="card" style="background:white;box-shadow:var(--shadow-button-hover);color:var(--text-muted)">Button hover shadow<br>soft, close, no color</div>
<div class="card" style="background:rgb(241 245 249 / 0.6);backdrop-filter:blur(8px);box-shadow:var(--shadow-card-lg);border:1px solid var(--border-soft);color:var(--slate-700)">Timeline card<br>blur + heavier shadow</div>
</body></html>
