<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radii" subtitle="Two radii cover everything: 2xl cards, full pills" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--bg-page);display:flex;align-items:center;gap:20px;height:150px;padding:0 24px;box-sizing:border-box}
.box{width:90px;height:90px;background:var(--slate-100);border:1px solid var(--border-default);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted);text-align:center}
</style></head>
<body>
<div class="box" style="border-radius:var(--radius-md)">radius-md<br>8px</div>
<div class="box" style="border-radius:var(--radius-2xl)">radius-2xl<br>16px<br>(cards, photos, Button)</div>
<div class="box" style="border-radius:var(--radius-full)">radius-full<br>(pills, dots)</div>
</body></html>
