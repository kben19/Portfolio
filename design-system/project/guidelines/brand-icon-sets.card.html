<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--bg-page);display:flex;flex-direction:column;justify-content:center;gap:14px;height:150px;padding:0 24px;box-sizing:border-box}
.row{display:flex;align-items:center;gap:14px}

<body>
<div class="row"><span class="label">Lucide (UI)</span>

</div>
<div class="row"><span class="label">Simple Icons (brand)</span>
  <img src="https://unpkg.com/simple-icons@latest/icons/github.svg">
  <img src="https://unpkg.com/simple-icons@latest/icons/linkedin.svg">
  <img src="https://unpkg.com/simple-icons@latest/icons/medium.svg">
