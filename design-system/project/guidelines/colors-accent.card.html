<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page)}
  .row{display:flex;height:150px}
  .sw{flex:1;display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;color:white;font-size:12px}
  .sw.light{color:var(--text-primary)}
</style></head>
<body>
<div class="row">
  <div class="sw light" style="background:var(--emerald-100)">emerald-100<br>#d1fae5</div>
  <div class="sw light" style="background:var(--emerald-400)">emerald-400<br>#34d399</div>
  <div class="sw" style="background:var(--emerald-500)">emerald-500 (accent)<br>#10b981</div>
  <div class="sw" style="background:var(--emerald-700)">emerald-700<br>#047857</div>
</div>
</body></html>
