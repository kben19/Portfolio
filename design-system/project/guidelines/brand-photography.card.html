<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--bg-page);display:flex;gap:10px;height:220px;padding:16px;box-sizing:border-box}
.frame{flex:1;border-radius:var(--radius-2xl);border:1px solid var(--border-default);overflow:hidden;position:relative}
img{width:100%;height:100%;object-fit:cover;display:block}
span{position:absolute;bottom:6px;left:8px;font-size:11px;color:white;background:rgb(0 0 0 / 0.45);padding:2px 8px;border-radius:var(--radius-full)}
</style></head>
<body>
<div class="frame"><img src="../assets/photos/me-hero.jpeg">
<span>hero — untouched</span></div>
<div class="frame"><img src="../assets/photos/contact-photo.jpeg">
<span>contact — brightness/contrast/saturate +10%</span></div>
</body></html>
